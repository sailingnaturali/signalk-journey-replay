name: publish
on:
  release:
    types: [published]
permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC)
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run: npm publish
